// Build dummy agg
const buildAgg = (clubs) => {
  const keys = Object.keys(clubs);
  const sections = ["ptSales","conduct","assessment","afResult","afRecovery","penetration","newRenewal"];
  const agg = {};
  sections.forEach(sec => {
    const first = clubs[keys[0]][sec];
    const result = {};
    Object.keys(first).forEach(k => {
      if (typeof first[k]==="number") result[k] = keys.reduce((s,c)=>s+(clubs[c][sec][k]||0),0);
      else if (Array.isArray(first[k])) result[k] = keys.flatMap(c=>(clubs[c][sec][k]||[]).map(i=>({...i,club:c})));
      else result[k] = first[k];
    });
    if (["conduct","assessment"].includes(sec) && result.score) result.score = Math.round(result.score/keys.length);
    if (sec==="penetration" && result.pct) result.pct = Math.round(result.pct/keys.length);
    if (sec==="afRecovery" && result.penetration) result.penetration = Math.round(result.penetration/keys.length);
    agg[sec] = result;
  });
  agg.conduct.bracket = agg.conduct.score>=85?"A":agg.conduct.score>=70?"B":agg.conduct.score>=55?"C":"D";
  return agg;
};
DUMMY.agg = buildAgg(DUMMY.clubs);

// ─── HELPERS ────────────────────────────────────────────────────

const fmtRp = v=>`Rp ${fmt(v)}`;
const pct   = (a,b)=>Math.min(Math.round((a/b)*100),100);

// ─── MICRO UI ───────────────────────────────────────────────────
const Bar = ({val,max,color=C.purple,h=5})=>{
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(pct(val,max)),130);return()=>clearTimeout(t);},[val,max]);
  return <div style={{background:C.border,borderRadius:99,height:h,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",background:color,borderRadius:99,transition:"width 0.9s cubic-bezier(.4,0,.2,1)",boxShadow:`0 0 8px ${color}55`}}/></div>;
};

const Ring = ({val,max,color=C.purple,size=72,thick=7})=>{
  const r=size/2-thick; const circ=2*Math.PI*r;
  const [dash,setDash]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setDash(pct(val,max)/100*circ),160);return()=>clearTimeout(t);},[val,max,circ]);
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={thick}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={thick}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:"stroke-dasharray 1s cubic-bezier(.4,0,.2,1)",filter:`drop-shadow(0 0 5px ${color})`}}/>

  );
};

    const callbackName = "afCb_" + Date.now();
    const script = document.createElement("script");

    window[callbackName] = (json) => {
      try {

          setData(json);
          setSource("live");
          setLastSync(new Date().toLocaleTimeString("id-ID"));

    };

      setLoading(false);
      delete window[callbackName];
      if (document.body.contains(script)) document.body.removeChild(script);
    };
